
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: "Microsoft YaHei", sans-serif;
      background-color: #f8f9fa;
    }
    h3 {
      color: #2f3542;
      display: flex;
      align-items: center;
      margin-top: 0;
    }
    .btn {
      width: 100%;
      background-color: #ff4757;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .btn:hover {
      background-color: #e84118;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #747d8c;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>📈 财务数据抓取</h3>
  <button id="scrapeBtn" class="btn">提取页面报表并下载</button>
  <div id="status">提示：页面上的财报已标红</div>
  <script src="popup.js"></script>
</body>
</html>
